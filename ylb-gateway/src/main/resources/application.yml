server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200
    accept-count: 100

spring:
  application:
    name: ylb-gateway
  
  # 激活的环境配置（dev/prod）
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:you host}:${DB_PORT:3306}/${DB_NAME:yuliangbao}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:you name}
    password: ${DB_PASSWORD:you password}
    
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      max-evictable-idle-time-millis: 900000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: ${DRUID_USERNAME:you name}
        login-password: ${DRUID_PASSWORD:you password}
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
  
  # Redis配置
  redis:
    host: ${REDIS_HOST:you host}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:you password}
    database: ${REDIS_DATABASE:0}
    timeout: 10000ms
    # lettuce连接池配置（需要commons-pool2依赖，暂时禁用）
    # lettuce:
    #   pool:
    #     max-active: 200
    #     max-wait: -1ms
    #     max-idle: 10
    #     min-idle: 0
  
  # RabbitMQ配置
  rabbitmq:
    host: ${RABBITMQ_HOST:you host}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:you name}
    password: ${RABBITMQ_PASSWORD:you password}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        concurrency: 10
        max-concurrency: 20
        prefetch: 5
        acknowledge-mode: manual
        retry:
          enabled: true
          max-attempts: 3
  
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.yuliangbao.common.pojo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      insert-strategy: not_null
      update-strategy: not_null

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh-CN
    swagger-model-name: 实体类列表

# Swagger配置
springfox:
  documentation:
    enabled: true
    swagger-ui:
      enabled: true
    auto-startup: true

# 日志配置（详细配置见 logback-spring.xml）
logging:
  level:
    root: info
    com.yuliangbao: debug

# Actuator监控配置
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

# 应用自定义配置
app:
  # CORS配置（生产环境必须配置具体域名，用逗号分隔）
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  
  # JWT配置（生产环境必须通过环境变量设置）
  jwt:
    secret: ${JWT_SECRET:yuliangbao2026secretkey-must-be-at-least-256-bits-for-hs256}
    expiration: ${JWT_EXPIRATION:604800000}
    header: Authorization
    prefix: Bearer
  
  # 文件上传配置
  upload:
    path: ${UPLOAD_PATH:/data/upload}
    max-size: 10485760
    allowed-types: jpg,jpeg,png,gif,bmp,webp
  
  # 阿里云OSS配置
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:your_access_key_id}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:your_access_key_secret}
    bucket-name: ${OSS_BUCKET_NAME:yuliangbao}
    # 访问域名（可选，CDN加速域名）
    domain: ${OSS_DOMAIN:https://yuliangbao.oss-cn-beijing.aliyuncs.com}

  # 微信小程序配置
  wechat:
    miniapp:
      appid: ${WECHAT_APPID:your_appid}
      secret: ${WECHAT_SECRET:your_secret}
    pay:
      appid: ${WECHAT_PAY_APPID:your_appid}
      mchid: ${WECHAT_PAY_MCHID:your_mchid}
      apikey: ${WECHAT_PAY_APIKEY:your_apikey}
      certpath: ${WECHAT_PAY_CERTPATH:/data/cert/apiclient_cert.p12}
